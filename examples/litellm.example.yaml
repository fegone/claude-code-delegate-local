# LiteLLM example config for claude-code-delegate-local
# ─────────────────────────────────────────────────────────────────────────────
# 1. Copy this file to wherever you want (e.g. ~/litellm/config.yaml)
# 2. Replace `sk-CHANGE-ME` below with a secret of your choice
# 3. Set the required env vars (see bottom of file)
# 4. Run: litellm --config config.yaml --port 4000
# 5. Point this MCP at it:
#       DELEGATE_LOCAL_URL=http://localhost:4000/v1/messages
#       DELEGATE_LOCAL_KEY=sk-CHANGE-ME
#
# Comment out any provider block you don't use — LiteLLM will skip it.
# ─────────────────────────────────────────────────────────────────────────────

litellm_settings:
  set_verbose: false
  drop_params: true     # silently drop params a provider doesn't support

general_settings:
  master_key: sk-CHANGE-ME   # ← this is what you pass to DELEGATE_LOCAL_KEY

model_list:

  # ═══════════════════════════════════════════════════════════════════════════
  # LOCAL MODELS — via llama.cpp / vLLM / LM Studio / Ollama
  # ═══════════════════════════════════════════════════════════════════════════

  # llama.cpp server or LM Studio (OpenAI-compatible endpoint on :8000)
  - model_name: local-qwen-3-6-35b
    litellm_params:
      model: openai/Qwen3-6-35B   # name as reported by your local server
      api_base: http://localhost:8000/v1
      api_key: sk-no-key-required

  # Ollama
  - model_name: local-llama-3-3-70b
    litellm_params:
      model: ollama_chat/llama3.3:70b
      api_base: http://localhost:11434

  # ═══════════════════════════════════════════════════════════════════════════
  # DEEPSEEK — cloud, needs API key from platform.deepseek.com
  # deepseek-chat/deepseek-reasoner are DEPRECATED (removed 2026-07-24) — use the
  # v4 model ids below. Thinking is now a RUNTIME PARAMETER (extra_body.thinking +
  # reasoning_effort), not a separate model. deepseek-v4-pro reasons even with no
  # extra_body set, so pin reasoning_effort explicitly rather than relying on the
  # implicit default. ⚠️ Use the `deepseek/` provider prefix, NOT `openai/` — with
  # `openai/` LiteLLM 1.83.9 bridges /v1/messages (the Anthropic-format route this
  # MCP uses) through the Responses API, which DeepSeek's endpoint doesn't
  # implement → silent 404 with an empty message. `deepseek/` uses chat/completions
  # under the hood and maps reasoning_content → an Anthropic `thinking` block
  # correctly. Verified live 2026-07-06.
  # ═══════════════════════════════════════════════════════════════════════════

  - model_name: deepseek-v4-flash     # fast, non-thinking, cheapest
    litellm_params:
      model: deepseek/deepseek-v4-flash
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: deepseek-v4-pro       # reasoning_effort: high, explicit — no ambiguous "default" tier
    litellm_params:
      model: deepseek/deepseek-v4-pro
      api_key: os.environ/DEEPSEEK_API_KEY
      extra_body:
        thinking:
          type: enabled
        reasoning_effort: high

  - model_name: deepseek-v4-pro-max   # deepest reasoning — only for genuinely hard problems (slower, more tokens)
    litellm_params:
      model: deepseek/deepseek-v4-pro
      api_key: os.environ/DEEPSEEK_API_KEY
      extra_body:
        thinking:
          type: enabled
        reasoning_effort: max

  # ═══════════════════════════════════════════════════════════════════════════
  # Z.AI — GLM CODING PLAN (flat-rate subscription, Anthropic-compatible endpoint)
  # Plan: https://z.ai/model-api  ·  Docs: https://docs.z.ai/devpack/tool/claude
  # Flat-rate coding plan → use the Anthropic endpoint below. Prompt caching is
  # automatic server-side (no config needed). To activate: export ZAI_API_KEY and
  # restart LiteLLM. The alias has no openai/gpt/deepseek/qwen prefix, so this MCP
  # routes it via /v1/messages (Anthropic format) — which matches this endpoint.
  #
  # Three reasoning tiers, ALL still inside the flat-rate plan ($0 extra token
  # cost) — thinking is controlled with a real Anthropic-format `thinking` block +
  # numeric `budget_tokens`, not `reasoning_effort` (that param only exists on
  # Z.ai's separate pay-as-you-go /api/paas/v4 endpoint — don't route there for
  # this, it defeats the point of the flat plan). Verified live 2026-07-06.
  # ⚠️ TESTING GOTCHA: verify thinking via a request to `/v1/messages` (Anthropic
  # format). LiteLLM's `drop_params: true` silently strips `thinking` when the
  # request comes in via `/v1/chat/completions` (OpenAI format) and translates to
  # this Anthropic-native endpoint — you'll get a false negative ("no thinking
  # block") even though the config is correct.
  # ═══════════════════════════════════════════════════════════════════════════

  - model_name: glm-coding-plan       # no thinking — fast, for mechanical/CRUD work
    litellm_params:
      model: "anthropic/glm-5.2"          # verified live in LiteLLM. The [1m] (1M) suffix errors against the Z.ai Anthropic endpoint here — use plain glm-5.2.
      api_base: https://api.z.ai/api/anthropic
      api_key: os.environ/ZAI_API_KEY
      input_cost_per_token: 0.0           # coding plan = flat rate, not per-token
      output_cost_per_token: 0.0

  - model_name: glm-coding-plan-think  # thinking on, budget 16K — debugging / architecture / subtle correctness
    litellm_params:
      model: "anthropic/glm-5.2"
      api_base: https://api.z.ai/api/anthropic
      api_key: os.environ/ZAI_API_KEY
      thinking:
        type: enabled
        budget_tokens: 16000
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: glm-coding-plan-max    # thinking on, budget 64K — hard problems only (multi-system, concurrency, differential correctness)
    litellm_params:
      model: "anthropic/glm-5.2"
      api_base: https://api.z.ai/api/anthropic
      api_key: os.environ/ZAI_API_KEY
      thinking:
        type: enabled
        budget_tokens: 64000               # request must set max_tokens > budget_tokens (e.g. 90000) — the delegate's own 65536 default is NOT enough headroom at this budget
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  # ═══════════════════════════════════════════════════════════════════════════
  # MINIMAX M3 — cloud, 1M context, native multimodal. Needs api.minimax.io key.
  # M3's thinking is a 3-way toggle (enabled/adaptive/disabled), not a 2-tier
  # high/max effort like GLM/DeepSeek — and it's ON by default when omitted. Pin
  # it explicitly rather than relying on the implicit default.
  # ⚠️ GOTCHA: keep the `openai/` provider prefix here. Switching to the native
  # `minimax/` provider (which DOES fix the same issue for DeepSeek) instead
  # BREAKS the /v1/messages route entirely for M3 (hard 404) — verified live
  # 2026-07-06, reverted immediately. Reasoning still happens with `openai/` (visible
  # via reasoning_content over /v1/chat/completions), it just arrives inline inside
  # the text block instead of a separate `thinking` block over /v1/messages —
  # functionally fine, cosmetic only.
  # ═══════════════════════════════════════════════════════════════════════════

  - model_name: minimax-m3
    litellm_params:
      model: openai/MiniMax-M3
      api_base: https://api.minimax.io/v1
      api_key: os.environ/MINIMAX_API_KEY
      extra_body:
        thinking:
          type: enabled

  # ═══════════════════════════════════════════════════════════════════════════
  # OPENAI / OPENROUTER
  # ═══════════════════════════════════════════════════════════════════════════

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: openrouter-claude-sonnet
    litellm_params:
      model: openrouter/anthropic/claude-3.5-sonnet
      api_key: os.environ/OPENROUTER_API_KEY

  # ═══════════════════════════════════════════════════════════════════════════
  # AWS BEDROCK — Claude, Llama, Nova via your AWS account
  # ═══════════════════════════════════════════════════════════════════════════

  - model_name: bedrock-sonnet
    litellm_params:
      model: bedrock/anthropic.claude-3-5-sonnet-20241022-v2:0
      aws_region_name: us-east-1
      aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID
      aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY

  - model_name: bedrock-llama-3-3-70b
    litellm_params:
      model: bedrock/meta.llama3-3-70b-instruct-v1:0
      aws_region_name: us-east-1
      aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID
      aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY

  # ═══════════════════════════════════════════════════════════════════════════
  # xAI GROK — OpenAI-compatible (api.x.ai/v1). The server routes grok-* through
  # /v1/chat/completions automatically (case-insensitive prefix match).
  # ═══════════════════════════════════════════════════════════════════════════

  - model_name: grok-4.5
    litellm_params:
      model: xai/grok-4.5
      api_key: os.environ/XAI_API_KEY

  # ═══════════════════════════════════════════════════════════════════════════
  # ANTHROPIC DIRECT — if you don't use Bedrock
  # ═══════════════════════════════════════════════════════════════════════════

  - model_name: anthropic-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED ENV VARS — set these in your shell before launching litellm:
# ─────────────────────────────────────────────────────────────────────────────
# export DEEPSEEK_API_KEY=sk-...
# export ZAI_API_KEY=...            # Z.ai GLM Coding Plan key — from https://z.ai/model-api
# export OPENAI_API_KEY=sk-...
# export XAI_API_KEY=xai-...          # xAI Grok — from https://console.x.ai
# export OPENROUTER_API_KEY=sk-or-v1-...
# export ANTHROPIC_API_KEY=sk-ant-...
# export AWS_ACCESS_KEY_ID=AKIA...
# export AWS_SECRET_ACCESS_KEY=...
#
# Tip: put them in a `.env` file and run `litellm --config config.yaml --port 4000`
# from a shell that has them loaded (e.g. `set -a; source .env; set +a`).
# ─────────────────────────────────────────────────────────────────────────────
